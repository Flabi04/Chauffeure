<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b1f3a">
    <title>Admin - Chauffeur Control</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p>Admin</p>
        <h1>Chauffeur Control</h1>
      </div>
      <a href="index.html">Fahrer</a>
    </header>

    <main class="container wide">
      <section class="panel">
        <div class="admin-head">
          <div>
            <h2>Gespeicherte Fahrten</h2>
            <p class="muted">Alle Eintraege aus Supabase.</p>
          </div>
          <button id="reloadButton" class="secondary" type="button">Neu laden</button>
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Datum</th>
                <th>Fahrer</th>
                <th>Fahrzeug</th>
                <th>Tour</th>
                <th>Zeit</th>
                <th>KM</th>
                <th>Probleme</th>
                <th>Bemerkung</th>
              </tr>
            </thead>
            <tbody id="fahrtenTbody"></tbody>
          </table>
        </div>
        <p id="adminStatus" class="status" role="status"></p>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
